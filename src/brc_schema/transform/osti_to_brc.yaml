id: https://w3id.org/brc/osti_to_brc
title: osti_to_brc
source_schema: osti_schema
target_schema: brc_schema

class_derivations:
  DatasetCollection:
    populated_from: records
    slot_derivations:
      datasets:
        populated_from: records
      # The schema version must correspond to the BRC schema version
      # This is a static value here but is updated when the BRC schema
      # is updated
      schema_version:
        expr: "'0.1.13'"

  Dataset:
    populated_from: Record
    slot_derivations:
      brc:
        expr: |
          # Check site_ownership_code first (direct passthrough)
          if src.site_ownership_code:
            target = src.site_ownership_code
          else:
            # Map DOE contract numbers to BRC values
            # Check multiple possible locations for the contract number
            contract_map = {
              'SC0018420': 'CABBI',
              'SC0018409': 'GLBRC',
              'AC36-08GO28308': 'CBI',
              'AC02-05CH11231': 'JBEI'
            }
            
            contract_num = None
            
            # Check doe_contract_number field (deprecated but may be present)
            if src.doe_contract_number:
              contract_num = src.doe_contract_number
            # Check contract_number field (deprecated but may be present)
            elif src.contract_number:
              contract_num = src.contract_number
            # Check identifiers list for CN_DOE type
            elif src.identifiers:
              for identifier in src.identifiers:
                if identifier.type == 'CN_DOE':
                  contract_num = identifier.value
                  break
            
            # Map to BRC value if found in our mapping
            target = contract_map.get(contract_num, None) if contract_num else None
      title:
        populated_from: title
      description:
        populated_from: description
      abstract:
        populated_from: description
      date:
        expr: "publication_date if publication_date else entry_date"
      issue:
        expr: "issue if issue else journal_issue"
      identifier:
        expr: |
          if src.osti_id:
            target = f"https://www.osti.gov/biblio/{src.osti_id}"
          else:
            target = None
      bibliographicCitation:
        expr: |
          if src.doi:
            target = 'https://doi.org/' + src.doi
          else:
            target = None
      keywords:
        expr: "build_brc_keywords(keywords, subjects)"
      journal_license_url:
        populated_from: journal_license_url
      journal_name:
        populated_from: journal_name
      journal_open_access_flag:
        populated_from: journal_open_access_flag
      journal_type:
        populated_from: journal_type
      journal_issn:
        populated_from: journal_issn
      volume:
        expr: "volume if volume else journal_volume"
      publication_date_text:
        populated_from: publication_date_text
      publisher_information:
        expr: "publisher_information if publisher_information else publisher"
      country_publication_code:
        populated_from: country_publication_code
      country_publication:
        populated_from: country_publication
      conference_information:
        expr: "conference_information if conference_information else conference_info"
      conference_type:
        populated_from: conference_type
      conference_title:
        populated_from: conference_title
      conference_location:
        populated_from: conference_location
      conference_date:
        populated_from: conference_date
      creator:
        expr: "build_brc_creators(persons, authors, organizations)"
      contributors:
        expr: "build_brc_contributors(persons, organizations)"
      funding:
        expr: "build_brc_funding(organizations, sponsor_orgs)"
      relatedItem:
        populated_from: related_identifiers
      media:
        populated_from: media
      #datasetType:
      #  populated_from: product_type
      dataset_url:
        expr: "build_brc_dataset_url(site_url, links)"
      active:
        expr: "workflow_status == 'R' if workflow_status else False"
      has_related_ids:
        expr: "build_brc_has_related_ids(identifiers, related_identifiers, identifier, other_identifiers, other_number, report_number)"

  MediaSet:
    populated_from: MediaSet
    slot_derivations:
      media_id:
        populated_from: media_id
      revision:
        populated_from: revision
      access_limitations:
        populated_from: access_limitations
      osti_id:
        populated_from: osti_id
      document_page_count:
        populated_from: document_page_count
      mime_type:
        populated_from: mime_type
      media_title:
        populated_from: media_title
      media_source:
        populated_from: media_source
      date_added:
        populated_from: date_added
      date_updated:
        populated_from: date_updated
      date_valid_end:
        populated_from: date_valid_end
      files:
        populated_from: files

  MediaFile:
    populated_from: MediaFile
    slot_derivations:
      media_file_id:
        populated_from: media_file_id
      media_id:
        populated_from: media_id
      checksum:
        populated_from: checksum
      revision:
        populated_from: revision
      parent_media_file_id:
        populated_from: parent_media_file_id
      media_type:
        populated_from: media_type
      url:
        populated_from: url
      mime_type:
        populated_from: mime_type
      media_source:
        populated_from: media_source
      file_size_bytes:
        populated_from: file_size_bytes
      duration_seconds:
        populated_from: duration_seconds
      document_page_count:
        populated_from: document_page_count
      subtitle_tracks:
        populated_from: subtitle_tracks
      video_tracks:
        populated_from: video_tracks
      pdf_version:
        populated_from: pdf_version
      pdfa_conformance:
        populated_from: pdfa_conformance
      pdfa_part:
        populated_from: pdfa_part
      pdfua_part:
        populated_from: pdfua_part
      date_file_added:
        populated_from: date_file_added
      date_file_updated:
        populated_from: date_file_updated

  Individual:
    populated_from: Person
    slot_derivations:
      name:
        expr: |
          if src.middle_name:
            target = src.first_name + ' ' + src.middle_name + ' ' + src.last_name
          else:
            target = src.first_name + ' ' + src.last_name
      email:
        expr: |
          if src.email and len(src.email) > 0:
            target = src.email[0]
          else:
            target = None
      primaryContact:
        expr: "src.type == 'AUTHOR'"
      affiliation:
        populated_from: affiliations
      orcid:
        populated_from: orcid

  Contributor:
    populated_from: Person
    slot_derivations:
      name:
        expr: |
          if src.middle_name:
            target = src.first_name + ' ' + src.middle_name + ' ' + src.last_name
          else:
            target = src.first_name + ' ' + src.last_name
      email:
        expr: |
          if src.email and len(src.email) > 0:
            target = src.email[0]
          else:
            target = None
      affiliation:
        populated_from: affiliations
      orcid:
        populated_from: orcid
      contributorType:
        populated_from: contributor_type

  BRCOrganization:
    populated_from: Affiliation
    slot_derivations:
      organizationName:
        populated_from: name
      ror_id:
        populated_from: ror_id

  Funding:
    populated_from: Organization
    slot_derivations:
      fundingOrganization:
        expr: |
          # Create a BRCOrganization from the Organization
          target = {'organizationName': src.name}
          if src.ror_id:
            target['ror_id'] = src.ror_id
      awardNumber:
        expr: |
          if src.identifiers:
            # Extract award numbers from identifiers
            awards = [id.value for id in src.identifiers if id.type in ['AWARD_DOI', 'CN_DOE', 'CN_NONDOE']]
            target = awards[0] if awards else None
          else:
            target = None
      awardTitle:
        expr: "None"
      awardURI:
        expr: |
          if src.identifiers:
            # Extract DOI awards and format as URI
            dois = [id.value for id in src.identifiers if id.type == 'AWARD_DOI']
            target = 'doi:' + dois[0] if dois else None
          else:
            target = None

  RelatedItem:
    populated_from: RelatedIdentifier
    slot_derivations:
      title:
        expr: "None"
      relatedItemIdentifier:
        populated_from: value
      relatedItemType:
        expr: |
          # Map OSTI identifier types to BRC CitedItemType
          # Note: must use if/elif rather than a dict.get() lookup because
          # the restricted expression evaluator (simpleeval) returns the raw
          # dict literal for multi-line dict-assignment expressions instead of
          # failing, causing the entire type_map to be written as the value.
          if src.type == 'DOI':
            target = 'JournalArticle'
          elif src.type in ('URL', 'URI'):
            target = 'Webpage'
          elif src.type == 'arXiv':
            target = 'Preprint'
          elif src.type == 'ISBN':
            target = 'Book'
          else:
            target = None
