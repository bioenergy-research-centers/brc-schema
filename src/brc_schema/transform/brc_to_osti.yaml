id: https://w3id.org/brc/brc_to_osti
title: brc_to_osti
source_schema: brc_schema
target_schema: osti_schema

enum_derivations:
  BRCEnum:
    populated_from: BRCEnum

class_derivations:
  records:
    populated_from: DatasetCollection
    slot_derivations:
      records:
        populated_from: datasets

  Record:
    populated_from: Dataset
    slot_derivations:
      access_limitations:
        expr: "['UNL']"
      product_type:
        expr: "'DA'"
      osti_id:
        expr: "identifier.split('/')[-1] if identifier and 'osti.gov/biblio/' in identifier else None"
      title:
        populated_from: title
      description:
        populated_from: description
      publication_date:
        expr: "date if date else None"
      released_to_osti_date:
        expr: "date if date else None"
      doi:
        expr: "bibliographicCitation.split('doi.org/')[-1] if bibliographicCitation and 'doi.org/' in bibliographicCitation else (str(bibliographicCitation).replace('doi:', '', 1) if bibliographicCitation and str(bibliographicCitation).startswith('doi:') else None)"
      site_ownership_code:
        populated_from: brc
        expr: "brc if brc else None"
      keywords:
        populated_from: keywords
      site_url:
        expr: "build_osti_site_url(dataset_url, identifier)"
      links:
        expr: "build_osti_links(dataset_url, identifier)"
      workflow_status:
        expr: "'R' if active else 'SR'"
      authors:
        expr: "build_osti_authors(creator)"
      persons:
        expr: "build_osti_persons(creator, contributors)"
      organizations:
        expr: "build_osti_organizations(funding, brc)"
      sponsor_orgs:
        expr: "build_osti_sponsor_orgs(funding, brc)"
      research_orgs:
        expr: "build_osti_research_orgs(brc)"
      identifiers:
        expr: "build_osti_identifiers(has_related_ids, identifier, brc)"
      related_identifiers:
        expr: "build_osti_related_identifiers(has_related_ids)"
      doe_contract_number:
        expr: "brc_contract(brc)"
      contract_number:
        expr: "brc_contract(brc)"
